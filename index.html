<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Web site created using create-react-app"
    />
    <link rel="apple-touch-icon" href="/logo192.png" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="/manifest.json" />
    <title>React App</title>
    <script>
      (function () {
        var KEY = '__nwrpg_errors';
        var MAX = 20;
        function append(rec) {
          try {
            var buf = JSON.parse(localStorage.getItem(KEY) || '[]');
            buf.push(rec);
            while (buf.length > MAX) buf.shift();
            localStorage.setItem(KEY, JSON.stringify(buf));
          } catch (e) {}
        }
        window.addEventListener('error', function (e) {
          append({
            t: Date.now(),
            type: 'window-error',
            message: e.message || (e.error && e.error.message) || 'error',
            stack: (e.error && e.error.stack) || null,
            filename: e.filename || null,
            lineno: e.lineno || null,
            colno: e.colno || null,
            url: location.href,
          });
        });
        window.addEventListener('unhandledrejection', function (e) {
          var r = e.reason;
          append({
            t: Date.now(),
            type: 'unhandledrejection',
            message: (r && r.message) || String(r),
            stack: (r && r.stack) || null,
            url: location.href,
          });
        });

        function addDebugButton() {
          if (document.getElementById('__nwrpg_dbg_btn')) return;
          var btn = document.createElement('a');
          btn.id = '__nwrpg_dbg_btn';
          btn.href = '/debug.html';
          btn.textContent = '?';
          btn.setAttribute('aria-label', 'Diagnostics');
          btn.style.cssText = [
            'position:fixed',
            'bottom:8px',
            'right:8px',
            'width:32px',
            'height:32px',
            'border-radius:50%',
            'background:rgba(0,0,0,0.35)',
            'color:#fff',
            'display:flex',
            'align-items:center',
            'justify-content:center',
            'font:bold 14px system-ui,-apple-system,sans-serif',
            'text-decoration:none',
            'z-index:99999',
            'user-select:none',
            '-webkit-tap-highlight-color:transparent',
          ].join(';');
          document.body.appendChild(btn);
        }
        if (document.body) {
          addDebugButton();
        } else {
          document.addEventListener('DOMContentLoaded', addDebugButton);
        }
      })();
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
