<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.ico" />
    <!-- viewport-fit=cover lets content extend under iOS notch / home indicator;
         StickyFooter etc. already use env(safe-area-inset-*) for spacing. -->
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#fefce8" />
    <meta
      name="description"
      content="The Family Keep — a quest log for the real work of running a household."
    />
    <!-- Prevent iOS from auto-linking strings that look like phone numbers. -->
    <meta name="format-detection" content="telephone=no" />

    <!-- iOS PWA: install-to-home-screen support. apple-touch-icon must be a
         real PNG path; iOS won't fall back to the manifest icons. -->
    <link rel="apple-touch-icon" href="/assets/App-Icon/Nwrpg-icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="The Family Keep" />

    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="/manifest.json" />
    <title>The Family Keep</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <!--
      This HTML file is a template.
      If you open it directly in the browser, you will see an empty page.

      The build step will place the bundled scripts into the <body> tag.

      To create a production bundle, use `npm run build` or `yarn build`.
    -->
      <script type="module" src="/src/index.jsx"></script>
  </body>
</html>
